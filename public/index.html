<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Murf AI Voice Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Segoe UI", "sans-serif"]
            },
            boxShadow: {
              neon: "0 0 30px rgba(0, 245, 255, 0.45), 0 0 80px rgba(127, 90, 240, 0.25)"
            },
            animation: {
              "soft-pulse": "softPulse 2.8s ease-in-out infinite",
              "fade-rise": "fadeRise 500ms ease forwards",
              float: "float 8s ease-in-out infinite"
            },
            keyframes: {
              softPulse: {
                "0%, 100%": { transform: "scale(1)", opacity: "0.9" },
                "50%": { transform: "scale(1.06)", opacity: "1" }
              },
              fadeRise: {
                from: { opacity: "0", transform: "translateY(16px)" },
                to: { opacity: "1", transform: "translateY(0)" }
              },
              float: {
                "0%, 100%": { transform: "translateY(0px)" },
                "50%": { transform: "translateY(-10px)" }
              }
            }
          }
        }
      };
    </script>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' x2='1' y1='0' y2='1'%3E%3Cstop stop-color='%2300f5ff'/%3E%3Cstop offset='1' stop-color='%23d946ef'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='64' height='64' rx='18' fill='%23060b16'/%3E%3Ccircle cx='32' cy='24' r='10' fill='url(%23g)'/%3E%3Cpath d='M20 43c4-6 20-6 24 0' stroke='url(%23g)' stroke-width='6' stroke-linecap='round' fill='none'/%3E%3C/svg%3E"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="min-h-screen overflow-x-hidden bg-slate-950 text-slate-100">
    <div id="root"></div>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
